spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# Actuator
management.endpoints.web.exposure.include=health,metrics,info
management.endpoint.health.show-details=always
management.info.env.enabled=true

info.app.nombre=Blueprints REST API
info.app.version=1.0.0
info.app.descripcion=API REST para gestion de blueprints - Lab #4 ARSW
info.app.estudiante=Brayan Loaiza
info.app.tecnologias=Java 21, Spring Boot 3.3.x, PostgreSQL, Docker

# Desactiva autoconfiguración JPA cuando no se usa el perfil postgres
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration
